version: 2.1

orbs:
  codecov: codecov/codecov@5.0.3
  snyk: snyk/snyk@2.1.0

jobs:
  build:
    docker:
      # Use node image
      - image: cimg/node:lts

    # code folder
    working_directory: ~/repo

    steps:
      # check out code
      - checkout

      # restore cache dependencies
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
            # fallback to using the latest cache if no exact match is found
            - v1-dependencies-

      # install dependencies (deterministic, lockfile-respecting)
      - run:
          name: Install dependencies
          command: npm ci

      - save_cache:
          paths:
            - node_modules
          key: v1-dependencies-{{ checksum "package-lock.json" }}

      # audit the packages
      - run: npm audit
      - run: npm ls

      # security test via the snyk orb
      - snyk/scan:
          fail-on-issues: true

      # correct line endings
      - run:
          name: Check line endings and whitespace
          command: find ./ -path ./node_modules -prune -o \( -name '*.css' -o -name '*.json' -o -name '*.md' -o -name '*.js' -o -name '*.yml' \) -print | xargs npx lintspaces --endofline 'lf' --newline --trailingspaces --verbose

      # lint
      - run:
          name: Lint
          command: npx eslint .

      # run tests with coverage
      - run:
          name: Run tests with coverage
          command: npx nyc npm test

      # generate lcov report
      - run:
          name: Generate coverage report
          command: npx nyc report --reporter=lcov > coverage.lcov

      # upload code coverage via the codecov orb
      - codecov/upload:
          file: coverage.lcov

workflows:
  version: 2
  build:
    jobs:
      - build
