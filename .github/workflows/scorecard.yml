name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    # Weekly run, Wednesday 04:23 UTC
    - cron: "23 4 * * 3"
  push:
    branches: [main, master]

# Top-level read-only by default; the analysis job widens what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # to upload SARIF results to GitHub code scanning
      security-events: write
      # to fetch an OIDC token for publishing results to scorecard.dev
      id-token: write
      # to read the repo
      contents: read
      # to read workflow definitions and other action metadata
      actions: read

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to https://scorecard.dev (required for the
          # README badge). Set to false for private repos.
          publish_results: true

      # Keep the SARIF for a few days so you can download it from the run.
      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: scorecard
