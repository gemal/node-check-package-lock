name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    environment: Development
    # Skip if this push is the automated version bump commit
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        # https://github.com/step-security/harden-runner/releases
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            malware-list.aikido.dev:443
            nodejs.org:443
            registry.npmjs.org:443

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # https://github.com/actions/checkout/releases
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        # https://github.com/actions/setup-node/releases
        with:
          node-version: "lts/*"
          cache: npm

      # safe-chain must be installed after setup-node so its shims wrap
      # the npm that the following steps actually use
      - name: Install and verify safe-chain
        uses: ./.github/actions/safe-chain

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run eslint

      - name: Run tests
        run: npm test

  release:
    name: Publish and Release
    needs: test
    runs-on: ubuntu-latest
    environment: Release
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    permissions:
      contents: write  # push version bump commit, create tags and GitHub releases
      id-token: write  # npm provenance attestation

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        # https://github.com/step-security/harden-runner/releases
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            uploads.github.com:443
            malware-list.aikido.dev:443
            nodejs.org:443
            registry.npmjs.org:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # https://github.com/actions/checkout/releases
        with:
          # persist-credentials needed to push the version bump commit back
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        # https://github.com/actions/setup-node/releases
        with:
          node-version: "lts/*"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      # safe-chain must be installed after setup-node so its shims wrap
      # the npm that the following steps actually use
      - name: Install and verify safe-chain
        uses: ./.github/actions/safe-chain

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        run: |
          npm version patch -m "chore: release %s [skip ci]"
          VERSION=$(node -p "require('./package.json').version")
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Push version bump
        run: git push --follow-tags

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub release
        # zizmor: ignore[template-injection] VERSION is passed as env var, not interpolated into shell
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.bump.outputs.version }}
