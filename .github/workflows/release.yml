name: Release

# Triggered when a GitHub Release is published. Tag the commit, draft a
# release on github.com, click "Publish release" — that fires this.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm with provenance
    runs-on: ubuntu-latest

    permissions:
      contents: read
      # OIDC token used by `npm publish --provenance` to sign a
      # Sigstore attestation that ties the tarball to this workflow run.
      id-token: write

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Checkout the released tag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Set up Aikido safe-chain
        uses: AikidoSec/safe-chain-action@v1

      - name: Install dependencies
        run: npm ci

      - name: Verify lockfile is clean
        run: node index.js

      - name: Lint
        run: npx eslint .

      - name: Run tests
        run: npm test

      # `--provenance` requires npm >= 9.5 (bundled with Node 20+) and the
      # `id-token: write` permission above. `--access public` ensures the
      # package is visible even if the maintainer's npm account scope changes.
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
